<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen - Conversor Inteligente</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animate"></div>
    
    <main class="glass-card">
        <header>
            <div class="logo">NexGen <span>AI</span></div>
            <h1>Conversor de Moedas</h1>
        </header>

        <section class="converter-box">
            <div class="input-wrapper">
                <label>De:</label>
                <div class="custom-select">
                    <select id="moeda-origem">
                        <option value="USD">🇺🇸 USD - Dólar</option>
                        <option value="EUR">🇪🇺 EUR - Euro</option>
                        <option value="GBP">🇬🇧 GBP - Libra</option>
                        <option value="BTC">₿ BTC - Bitcoin</option>
                    </select>
                </div>
                <input type="number" id="valor-input" placeholder="0.00">
            </div>

            <div class="swap-icon">⇅</div>

            <div class="input-wrapper disabled">
                <label>Para:</label>
                <div class="static-value">🇧🇷 BRL - Real</div>
                <input type="text" id="valor-resultado" readonly placeholder="R$ 0,00">
            </div>
        </section>

        <section class="ai-insight" id="ai-container">
            <div class="ai-header">
                <span class="ai-sparkle">✨</span> AI Insight
            </div>
            <p id="ai-status">Analisando tendências do mercado...</p>
        </section>

        <footer class="real-time-badge">
            <span class="dot"></span> Live Rate: <strong id="rate-text">---</strong>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
