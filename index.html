<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor Multimoedas Real-Time</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>💰 Conversor de Moedas</h1>
        <p id="cotacao-atual" class="status-api">Buscando cotações...</p>

        <div class="input-group">
            <label for="moeda-select">Moeda de Origem:</label>
            <select id="moeda-select">
                <option value="USD">🇺🇸 Dólar Americano (USD)</option>
                <option value="EUR">🇪🇺 Euro (EUR)</option>
                <option value="GBP">🇬🇧 Libra Esterlina (GBP)</option>
                <option value="BTC">₿ Bitcoin (BTC)</option>
            </select>
        </div>

        <div class="input-group">
            <label for="input-valor">Valor a converter:</label>
            <input type="number" id="input-valor" placeholder="Ex: 100.00" step="0.01">
        </div>

        <div class="input-group">
            <label for="brl-result">Resultado em Real (BRL):</label>
            <input type="text" id="brl-result" readonly placeholder="R$ 0,00">
        </div>

        <button id="update-btn" onclick="converter()">🔄 Atualizar Cotação</button>
        
        <p class="footer-info">Dados fornecidos por AwesomeAPI</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
